services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: mycis
      POSTGRES_USER: mycis
      POSTGRES_PASSWORD: mycis
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      APP_ADDR: ":8081"
      DATABASE_URL: "postgres://mycis:mycis@db:5432/mycis?sslmode=disable"
      APP_SESSION_KEY: "${APP_SESSION_KEY:?set APP_SESSION_KEY in .env or the environment}"
      APP_COOKIE_SECURE: "false"
    ports:
      - "8081:8081"

volumes:
  postgres-data:
