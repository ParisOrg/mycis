{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mycis.fullname" . }}
  labels:
    {{- include "mycis.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.databaseUrlKey }}: {{ required "secret.databaseUrl is required when secret.create is true" .Values.secret.databaseUrl | quote }}
  {{ .Values.secret.sessionKeyKey }}: {{ required "secret.sessionKey is required when secret.create is true" .Values.secret.sessionKey | quote }}
{{- end }}
