name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and publish (e.g. v1.2.3)"
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          case "$TAG" in
            v*) ;;
            *)
              echo "Tag must start with v (e.g. v1.2.3), got: $TAG"
              exit 1
              ;;
          esac
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Lowercase image base (GHCR)
        id: image
        run: |
          base="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - name: Sync chart version with tag
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          sed -i.bak "s/^version: .*/version: ${VERSION}/" charts/mycis/Chart.yaml
          sed -i.bak "s/^appVersion: .*/appVersion: \"${VERSION}\"/" charts/mycis/Chart.yaml
          rm -f charts/mycis/Chart.yaml.bak

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.base }}:${{ steps.tag.outputs.version }}
            ${{ steps.image.outputs.base }}:latest

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Package and push Helm chart (OCI)
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          helm package charts/mycis
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push "mycis-${VERSION}.tgz" "oci://ghcr.io/${OWNER_LC}/helm-charts"
