framework:
  slug: "nist-csf-2-0"
  label: "NIST Cybersecurity Framework"
  version: "2.0"

groups:
  # ── GOVERN ──────────────────────────────────────────────────────────────────
  - code: "GV.OC"
    title: "Organizational Context"
    summary: "The circumstances — mission, stakeholder expectations, and dependencies — surrounding the organization's cybersecurity risk management decisions are understood."
    description: "Understanding organizational context is the foundation for meaningful cybersecurity risk management. It ensures that risk decisions align with business objectives, legal obligations, and stakeholder expectations."

  - code: "GV.RM"
    title: "Risk Management Strategy"
    summary: "The organization's priorities, constraints, risk tolerance and appetite statements, and assumptions are established, communicated, and used to support operational risk decisions."
    description: "An explicit risk management strategy gives decision-makers a consistent basis for accepting, mitigating, transferring, or avoiding cybersecurity risks across the enterprise."

  - code: "GV.RR"
    title: "Roles, Responsibilities, and Authorities"
    summary: "Cybersecurity roles, responsibilities, and authorities to foster accountability, performance assessment, and continuous improvement are established and communicated."
    description: "Clear accountability structures ensure that cybersecurity responsibilities are understood across the organization and that adequate authority exists to act on risk decisions."

  - code: "GV.PO"
    title: "Policy"
    summary: "Organizational cybersecurity policy is established, communicated, and enforced."
    description: "Policy translates governance intent into mandatory requirements that guide behaviour and technical controls throughout the organization."

  - code: "GV.OV"
    title: "Oversight"
    summary: "Results of organization-wide cybersecurity risk management activities and performance are used to inform, improve, and adjust the risk management strategy."
    description: "Oversight closes the governance loop by ensuring that strategy, resources, and outcomes are reviewed and adjusted as the threat landscape and business environment evolve."

  - code: "GV.SC"
    title: "Cybersecurity Supply Chain Risk Management"
    summary: "Cyber supply chain risk management processes are identified, established, managed, monitored, and improved by organizational stakeholders."
    description: "Supply chain risks — from hardware components to managed services — require dedicated governance because the organization's risk posture depends on the security practices of its suppliers and partners."

  # ── IDENTIFY ─────────────────────────────────────────────────────────────────
  - code: "ID.AM"
    title: "Asset Management"
    summary: "Assets (data, hardware, software, systems, facilities, services, people) that enable the organization to achieve business purposes are identified and managed consistent with their relative importance to organizational objectives."
    description: "You cannot protect what you do not know you have. Comprehensive, up-to-date asset inventories are the prerequisite for almost every other cybersecurity practice."

  - code: "ID.RA"
    title: "Risk Assessment"
    summary: "The cybersecurity risk to the organization, assets, and individuals is identified, analyzed, prioritized, and communicated."
    description: "Risk assessments translate threat and vulnerability information into actionable risk data that informs investment and treatment decisions."

  - code: "ID.IM"
    title: "Improvement"
    summary: "Improvements to organizational cybersecurity risk management processes, procedures, and activities are identified across all CSF Functions."
    description: "Continuous improvement ensures that the cybersecurity program adapts to lessons learned from assessments, incidents, and changing business and threat conditions."

  # ── PROTECT ──────────────────────────────────────────────────────────────────
  - code: "PR.AA"
    title: "Identity Management, Authentication, and Access Control"
    summary: "Access to physical and logical assets is limited to authorized users, services, and hardware and managed commensurate with the assessed risk of unauthorized access."
    description: "Controlling who and what can access resources is the primary means of preventing unauthorized use, data breaches, and lateral movement by attackers."

  - code: "PR.AT"
    title: "Awareness and Training"
    summary: "The organization's personnel are provided with cybersecurity awareness and training so that they can perform their cybersecurity-related tasks."
    description: "People are both the most exploited attack vector and one of the most effective controls. Awareness and training reduce the likelihood of human-enabled incidents."

  - code: "PR.DS"
    title: "Data Security"
    summary: "Data are managed consistent with the organization's risk strategy to protect the confidentiality, integrity, and availability of information."
    description: "Data security controls protect information throughout its lifecycle — at rest, in transit, and in use — ensuring that sensitive data cannot be accessed, altered, or destroyed by unauthorized parties."

  - code: "PR.PS"
    title: "Platform Security"
    summary: "The hardware, software (e.g., firmware, operating systems, applications), and services of physical and virtual platforms are managed consistent with the organization's risk strategy."
    description: "Secure platform management reduces the attack surface by ensuring that systems are properly configured, patched, and hardened throughout their lifecycle."

  - code: "PR.IR"
    title: "Technology Infrastructure Resilience"
    summary: "Security architectures are managed with the organization's risk strategy to protect asset confidentiality, integrity, and availability, and organizational resilience."
    description: "Resilience controls ensure that the organization can withstand and recover from disruptions — whether from attacks, failures, or disasters — with minimal impact on mission-critical operations."

  # ── DETECT ───────────────────────────────────────────────────────────────────
  - code: "DE.CM"
    title: "Continuous Monitoring"
    summary: "Assets are monitored to find anomalies, indicators of compromise, and other potentially adverse events."
    description: "Continuous monitoring provides real-time or near-real-time visibility into the security state of the environment, enabling timely detection of threats before they escalate."

  - code: "DE.AE"
    title: "Adverse Event Analysis"
    summary: "Anomalies, indicators of compromise, and other potentially adverse events are analyzed to characterize the events and detect cybersecurity incidents."
    description: "Event analysis converts raw monitoring data into actionable intelligence, distinguishing benign anomalies from genuine threats and providing the context needed to declare and scope incidents."

  # ── RESPOND ──────────────────────────────────────────────────────────────────
  - code: "RS.MA"
    title: "Incident Management"
    summary: "Responses to detected cybersecurity incidents are managed."
    description: "Incident management provides the structure and coordination needed to contain threats quickly, minimize damage, and maintain stakeholder confidence during a security event."

  - code: "RS.AN"
    title: "Incident Analysis"
    summary: "Investigations are conducted to ensure effective response and support forensics and recovery activities."
    description: "In-depth analysis during an incident establishes what happened, how it happened, and what data or systems were affected — informing both immediate response and longer-term improvements."

  - code: "RS.CO"
    title: "Incident Response Reporting and Communication"
    summary: "Response activities are coordinated with internal and external stakeholders as required by laws, regulations, or policies."
    description: "Timely and accurate communication during incidents ensures that decision-makers, regulators, customers, and partners receive the information they need to act appropriately."

  - code: "RS.MI"
    title: "Incident Mitigation"
    summary: "Activities are performed to prevent expansion of an event and mitigate its effects."
    description: "Mitigation actions stop an incident from spreading and eliminate the attacker's foothold, creating the conditions necessary to begin safe recovery."

  # ── RECOVER ──────────────────────────────────────────────────────────────────
  - code: "RC.RP"
    title: "Incident Recovery Plan Execution"
    summary: "Restoration activities are performed to ensure operational availability of systems and services affected by cybersecurity incidents."
    description: "Structured recovery execution restores systems and services in priority order, verifying integrity at each step to ensure that restored assets are clean and fully functional."

  - code: "RC.CO"
    title: "Incident Recovery Communication"
    summary: "Restoration activities are coordinated with internal and external parties."
    description: "Recovery communications maintain stakeholder trust and satisfy legal obligations by keeping relevant parties informed of progress and expected timelines during restoration."


items:

  # ════════════════════════════════════════════════════════════════════════════
  # GOVERN
  # ════════════════════════════════════════════════════════════════════════════

  # GV.OC — Organizational Context (5)
  - group_code: "GV.OC"
    code: "GV.OC-01"
    title: "The organizational mission is understood and informs cybersecurity risk management"
    summary: "The organizational mission informs cybersecurity risk management"
    description: "Examples: cybersecurity risk management strategy explicitly references the organizational mission; cybersecurity objectives are aligned with mission objectives; mission statements used in risk tolerance setting."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.OC"
    code: "GV.OC-02"
    title: "Internal and external stakeholders are understood, and their needs and expectations regarding cybersecurity risk management are understood and considered"
    summary: "Stakeholder needs and expectations regarding cybersecurity are understood and considered"
    description: "Examples: stakeholder identification processes; recurring stakeholder review meetings; documented stakeholder expectations; customer contractual security requirements; regulatory body expectations."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.OC"
    code: "GV.OC-03"
    title: "Legal, regulatory, and contractual requirements regarding cybersecurity — including privacy and civil liberties obligations — are understood and managed"
    summary: "Legal, regulatory, and contractual cybersecurity requirements are understood and managed"
    description: "Examples: legal and regulatory requirement tracking; compliance calendars; contractual obligation registers; privacy impact assessments; data protection obligation inventories."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.OC"
    code: "GV.OC-04"
    title: "Critical objectives, capabilities, and services that external stakeholders depend on or expect from the organization are understood and communicated"
    summary: "Critical services that external stakeholders depend on are understood and communicated"
    description: "Examples: business impact analyses; service dependency mapping; SLA commitments; critical service availability requirements; external-facing service catalogues."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.OC"
    code: "GV.OC-05"
    title: "Outcomes, capabilities, and services that the organization depends on are understood and communicated"
    summary: "Outcomes, capabilities, and services that the organization depends on are understood"
    description: "Examples: vendor and partner dependency inventories; third-party service criticality assessments; resilience requirements for critical dependencies; single-point-of-failure analysis."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  # GV.RM — Risk Management Strategy (7)
  - group_code: "GV.RM"
    code: "GV.RM-01"
    title: "Risk management objectives are established and agreed to by organizational stakeholders"
    summary: "Risk management objectives are established and agreed to by stakeholders"
    description: "Examples: risk management steering committees; documented and board-approved risk management objectives; stakeholder sign-off on risk strategy; alignment between business and cybersecurity risk objectives."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.RM"
    code: "GV.RM-02"
    title: "Risk appetite and risk tolerance statements are established, communicated, and maintained"
    summary: "Risk appetite and risk tolerance statements are established, communicated, and maintained"
    description: "Examples: board-approved risk appetite statements; quantitative risk tolerance thresholds; risk tolerance broken down by risk category; periodic reviews and updates of risk appetite."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.RM"
    code: "GV.RM-03"
    title: "Organizational cybersecurity risk management is informed by and integrated into the enterprise risk management (ERM) framework"
    summary: "Cybersecurity risk management is integrated into the enterprise risk management framework"
    description: "Examples: cybersecurity risk included in ERM register; common risk taxonomy across ERM and cybersecurity; joint risk committee; shared risk reporting to the board."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.RM"
    code: "GV.RM-04"
    title: "Strategic direction that describes appropriate risk response options is established and communicated"
    summary: "Strategic direction for risk response options is established and communicated"
    description: "Examples: risk response policies (accept, mitigate, transfer, avoid); risk treatment decision frameworks; guidance on when to accept vs. remediate risk; pre-approved risk response templates."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.RM"
    code: "GV.RM-05"
    title: "Lines of communication across the organization are established for cybersecurity risks, including risks from suppliers and other third parties"
    summary: "Lines of communication are established for cybersecurity risks, including third-party risks"
    description: "Examples: defined escalation paths for cybersecurity risks; supplier risk communication channels; third-party risk reporting processes; cross-functional risk discussion forums."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.RM"
    code: "GV.RM-06"
    title: "A standardized method for calculating, documenting, categorizing, and prioritizing cybersecurity risks is established and communicated"
    summary: "A standardized method for calculating, documenting, and prioritizing cybersecurity risks is established"
    description: "Examples: risk scoring methodologies (qualitative and quantitative); risk register templates; risk prioritization criteria; FAIR or similar quantitative risk analysis methods."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.RM"
    code: "GV.RM-07"
    title: "Strategic opportunities (i.e., positive risks) are characterized and are included in organizational cybersecurity risk discussions"
    summary: "Strategic opportunities (positive risks) are characterized and included in risk discussions"
    description: "Examples: opportunity identification in risk assessments; innovation initiatives leveraging cybersecurity capabilities; risk-informed strategic planning that balances threats with opportunities."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  # GV.RR — Roles, Responsibilities, and Authorities (4)
  - group_code: "GV.RR"
    code: "GV.RR-01"
    title: "Organizational leadership is responsible and accountable for cybersecurity risk and fosters a culture that is risk-aware, ethical, and continually improving"
    summary: "Organizational leadership is accountable for cybersecurity risk and fosters a risk-aware culture"
    description: "Examples: board cybersecurity oversight; CISO reporting to CEO/board; executive accountability metrics for cybersecurity outcomes; leadership participation in tabletop exercises."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.RR"
    code: "GV.RR-02"
    title: "Roles, responsibilities, and authorities related to cybersecurity risk management are established, communicated, understood, and enforced"
    summary: "Cybersecurity roles, responsibilities, and authorities are established, communicated, and enforced"
    description: "Examples: RACI matrices for cybersecurity; job descriptions with cybersecurity responsibilities; enforcement mechanisms for accountability; documented delegation of authority."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.RR"
    code: "GV.RR-03"
    title: "Adequate resources are allocated commensurate with the cybersecurity risk strategy, roles, responsibilities, and policies"
    summary: "Adequate resources are allocated commensurate with the cybersecurity risk strategy"
    description: "Examples: cybersecurity budget allocation process; headcount planning for security roles; tool and technology investment aligned with risk strategy; resource gap analysis."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.RR"
    code: "GV.RR-04"
    title: "Cybersecurity is included in human resources practices"
    summary: "Cybersecurity is included in human resources practices"
    description: "Examples: background checks for positions with elevated access; cybersecurity in performance reviews; offboarding procedures for access revocation; security requirements in job descriptions."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  # GV.PO — Policy (2)
  - group_code: "GV.PO"
    code: "GV.PO-01"
    title: "Policy for managing cybersecurity risks is established based on organizational context, cybersecurity strategy, and priorities and is communicated and enforced"
    summary: "Cybersecurity risk management policy is established, communicated, and enforced"
    description: "Examples: information security policy; acceptable use policies; cybersecurity standards and procedures; policy enforcement mechanisms; policy exception processes."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.PO"
    code: "GV.PO-02"
    title: "Policy for managing cybersecurity risks is reviewed, updated, communicated, and enforced to reflect changes in requirements, threats, technology, and organizational mission"
    summary: "Cybersecurity risk management policy is regularly reviewed, updated, and communicated"
    description: "Examples: annual policy review cycles; policy update triggers (new regulations, threats, technologies); policy version control and communication plans; policy attestation processes."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  # GV.OV — Oversight (3)
  - group_code: "GV.OV"
    code: "GV.OV-01"
    title: "Cybersecurity risk management strategy outcomes are reviewed to inform and adjust strategy and direction"
    summary: "Cybersecurity risk management strategy outcomes are reviewed to inform and adjust strategy"
    description: "Examples: periodic strategy reviews; performance metrics tied to risk objectives; board and executive risk reporting; strategy adjustment based on outcomes and lessons learned."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.OV"
    code: "GV.OV-02"
    title: "The cybersecurity risk management strategy is reviewed and adjusted to ensure coverage of organizational requirements and risks"
    summary: "The cybersecurity risk management strategy is reviewed and adjusted to ensure adequate coverage"
    description: "Examples: gap analysis of risk coverage; strategy reviews triggered by organizational changes; independent assessments of strategy effectiveness; emerging threat coverage reviews."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  - group_code: "GV.OV"
    code: "GV.OV-03"
    title: "Organizational cybersecurity risk management performance is evaluated and reviewed for adjustments needed"
    summary: "Cybersecurity risk management performance is evaluated and reviewed for needed adjustments"
    description: "Examples: cybersecurity KPIs and KRIs; balanced scorecards for security performance; management reviews of security metrics; benchmarking against industry peers."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern"]

  # GV.SC — Cybersecurity Supply Chain Risk Management (10)
  - group_code: "GV.SC"
    code: "GV.SC-01"
    title: "A cybersecurity supply chain risk management program, strategy, objectives, policies, and processes are established and agreed to by organizational stakeholders"
    summary: "A cybersecurity supply chain risk management program is established and agreed to by stakeholders"
    description: "Examples: C-SCRM program charter; documented C-SCRM objectives and policies; stakeholder agreement on supply chain risk approach; dedicated supply chain risk management team."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern", "supply-chain"]

  - group_code: "GV.SC"
    code: "GV.SC-02"
    title: "Cybersecurity roles and responsibilities for suppliers, customers, and partners are established, communicated, and coordinated internally and externally"
    summary: "Cybersecurity roles and responsibilities for suppliers and partners are established and communicated"
    description: "Examples: supplier security liaisons; defined security responsibilities in contracts; joint security committees with key suppliers; security points of contact in supplier agreements."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern", "supply-chain"]

  - group_code: "GV.SC"
    code: "GV.SC-03"
    title: "Cybersecurity supply chain risk management is integrated into cybersecurity and enterprise risk management, risk assessment, and improvement processes"
    summary: "Supply chain risk management is integrated into enterprise risk management processes"
    description: "Examples: supply chain risk in the enterprise risk register; C-SCRM integrated into ERM governance; supply chain risks addressed in organizational risk assessments."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern", "supply-chain"]

  - group_code: "GV.SC"
    code: "GV.SC-04"
    title: "Suppliers are known and prioritized by criticality"
    summary: "Suppliers are known and prioritized by criticality"
    description: "Examples: supplier inventories; supplier criticality tiers; criteria for determining supplier criticality (access level, data sensitivity, business impact, substitutability)."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern", "supply-chain"]

  - group_code: "GV.SC"
    code: "GV.SC-05"
    title: "Requirements to address cybersecurity risks in supply chains are established, prioritized, and integrated into contracts and other types of agreements with suppliers and other relevant third parties"
    summary: "Cybersecurity requirements are established and integrated into supplier contracts and agreements"
    description: "Examples: cybersecurity contract clauses; minimum security baselines for suppliers; right-to-audit provisions; data protection agreements; incident notification obligations in contracts."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern", "supply-chain"]

  - group_code: "GV.SC"
    code: "GV.SC-06"
    title: "Planning and due diligence are performed to reduce risks before entering into formal supplier or other third-party relationships"
    summary: "Due diligence is performed to reduce risks before entering supplier relationships"
    description: "Examples: pre-contract security assessments; supplier security questionnaires; security certification requirements (ISO 27001, SOC 2); proof-of-concept security testing; financial health checks."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern", "supply-chain"]

  - group_code: "GV.SC"
    code: "GV.SC-07"
    title: "The risks posed by a supplier, their products and services, and other third parties are understood, recorded, prioritized, assessed, responded to, and monitored over the course of the relationship"
    summary: "Supplier risks are understood, recorded, assessed, and monitored throughout the relationship"
    description: "Examples: ongoing supplier risk monitoring; periodic supplier security reviews; supplier risk scoring; tracking supplier security incidents and vulnerability disclosures."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern", "supply-chain"]

  - group_code: "GV.SC"
    code: "GV.SC-08"
    title: "Relevant suppliers and other third parties are included in incident planning, response, and recovery activities"
    summary: "Suppliers and third parties are included in incident planning, response, and recovery"
    description: "Examples: supplier incident notification procedures; joint incident response exercises; supplier contacts in the incident response plan; mutual aid agreements with critical suppliers."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern", "supply-chain"]

  - group_code: "GV.SC"
    code: "GV.SC-09"
    title: "Supply chain security practices are integrated into cybersecurity and enterprise risk management programs, and their performance is monitored throughout the technology product and service life cycle"
    summary: "Supply chain security practices are integrated and monitored throughout the product and service life cycle"
    description: "Examples: secure development requirements for suppliers; software bill of materials (SBOM) requirements; end-of-life management for supplier products; continuous monitoring of supplier security posture."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern", "supply-chain"]

  - group_code: "GV.SC"
    code: "GV.SC-10"
    title: "Cybersecurity supply chain risk management plans include provisions for activities that occur after the conclusion of a partnership or service agreement"
    summary: "Supply chain risk management plans include provisions for activities after the conclusion of a partnership"
    description: "Examples: supplier offboarding procedures; data return and destruction requirements; access revocation on contract termination; transition plans; post-relationship security assessments."
    security_function: "GOVERN"
    asset_class: "Organization"
    tags: ["govern", "supply-chain"]


  # ════════════════════════════════════════════════════════════════════════════
  # IDENTIFY
  # ════════════════════════════════════════════════════════════════════════════

  # ID.AM — Asset Management (7)
  - group_code: "ID.AM"
    code: "ID.AM-01"
    title: "Inventories of hardware managed by the organization are maintained"
    summary: "Inventories of hardware managed by the organization are maintained"
    description: "Examples: hardware asset inventories; automated network discovery; CMDB; mobile device management (MDM) enrollment; IoT device registries; physical asset audits."
    security_function: "IDENTIFY"
    asset_class: "Devices"
    tags: ["identify"]

  - group_code: "ID.AM"
    code: "ID.AM-02"
    title: "Inventories of software, services, and systems managed by the organization are maintained"
    summary: "Inventories of software, services, and systems are maintained"
    description: "Examples: software asset management (SAM) tools; application portfolio registries; cloud service inventories; CMDB software records; container image registries."
    security_function: "IDENTIFY"
    asset_class: "Software"
    tags: ["identify"]

  - group_code: "ID.AM"
    code: "ID.AM-03"
    title: "Representations of the organization's authorized network communication and internal and external network data flows are maintained"
    summary: "Authorized network communications and data flows are documented and maintained"
    description: "Examples: network diagrams; data flow diagrams; network segmentation documentation; authorized connection lists; firewall rule reviews."
    security_function: "IDENTIFY"
    asset_class: "Networks"
    tags: ["identify"]

  - group_code: "ID.AM"
    code: "ID.AM-04"
    title: "Inventories of services provided by suppliers are maintained"
    summary: "Inventories of services provided by suppliers are maintained"
    description: "Examples: third-party service inventories; cloud service provider registries; managed service provider catalogues; SaaS application inventories; API dependency maps."
    security_function: "IDENTIFY"
    asset_class: "All"
    tags: ["identify", "supply-chain"]

  - group_code: "ID.AM"
    code: "ID.AM-05"
    title: "Assets are prioritized based on classification, criticality, resources, and impact on the mission"
    summary: "Assets are prioritized based on classification, criticality, and mission impact"
    description: "Examples: asset classification schemes; criticality ratings; business impact analyses; tiered protection levels based on asset importance; data classification policies."
    security_function: "IDENTIFY"
    asset_class: "All"
    tags: ["identify"]

  - group_code: "ID.AM"
    code: "ID.AM-07"
    title: "Inventories of data and corresponding metadata for designated data types are maintained"
    summary: "Inventories of data and corresponding metadata for designated data types are maintained"
    description: "Examples: data inventories; data classification catalogues; data flow inventories; personally identifiable information (PII) records; sensitive data registries; data maps."
    security_function: "IDENTIFY"
    asset_class: "Data"
    tags: ["identify"]

  - group_code: "ID.AM"
    code: "ID.AM-08"
    title: "Systems, hardware, software, services, and data are managed throughout their life cycles"
    summary: "Assets are managed throughout their life cycles"
    description: "Examples: asset lifecycle management procedures; decommissioning checklists; hardware disposal procedures; software end-of-life tracking; data retention and deletion policies."
    security_function: "IDENTIFY"
    asset_class: "All"
    tags: ["identify"]

  # ID.RA — Risk Assessment (10)
  - group_code: "ID.RA"
    code: "ID.RA-01"
    title: "Vulnerabilities in assets are identified, validated, and recorded"
    summary: "Vulnerabilities in assets are identified, validated, and recorded"
    description: "Examples: vulnerability scanning; penetration testing; security assessments; CVE tracking; vulnerability management platforms; authenticated vs. unauthenticated scanning."
    security_function: "IDENTIFY"
    asset_class: "All"
    tags: ["identify"]

  - group_code: "ID.RA"
    code: "ID.RA-02"
    title: "Cyber threat intelligence is received from information sharing forums and sources"
    summary: "Cyber threat intelligence is received from information sharing forums and sources"
    description: "Examples: threat intelligence feeds (commercial and open source); ISAC/ISAO membership; government advisories (CISA, FBI); threat intelligence platforms; vendor threat reports."
    security_function: "IDENTIFY"
    asset_class: "All"
    tags: ["identify"]

  - group_code: "ID.RA"
    code: "ID.RA-03"
    title: "Internal and external threats to the organization are identified and recorded"
    summary: "Internal and external threats to the organization are identified and recorded"
    description: "Examples: threat modelling; threat registers; insider threat programs; external threat landscape assessments; threat actor profiling; attack simulation exercises."
    security_function: "IDENTIFY"
    asset_class: "All"
    tags: ["identify"]

  - group_code: "ID.RA"
    code: "ID.RA-04"
    title: "Potential impacts and likelihoods of threats exploiting vulnerabilities are identified and recorded"
    summary: "Potential impacts and likelihoods of threats exploiting vulnerabilities are identified and recorded"
    description: "Examples: risk analysis methodologies; likelihood and impact ratings; risk scoring; attack path analysis; threat-vulnerability pairing; exposure assessments."
    security_function: "IDENTIFY"
    asset_class: "All"
    tags: ["identify"]

  - group_code: "ID.RA"
    code: "ID.RA-05"
    title: "Threats, vulnerabilities, likelihoods, and impacts are used to understand inherent risk and inform risk response prioritization"
    summary: "Risk data is used to understand inherent risk and inform prioritization of responses"
