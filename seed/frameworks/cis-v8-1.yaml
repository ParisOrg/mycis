framework:
  slug: cis-v8-1
  label: CIS Controls
  version: 8.1.2
groups:
  - code: "1"
    title: Inventory and Control of Enterprise Assets
    summary: Actively manage (inventory, track, and correct) all enterprise assets (end-user devices, including portable and mobile; network devices; non-computing/Internet of Things (IoT) devices; and servers) connected to the infra...
    description: Actively manage (inventory, track, and correct) all enterprise assets (end-user devices, including portable and mobile; network devices; non-computing/Internet of Things (IoT) devices; and servers) connected to the infrastructure physically, virtually, remotely, and those within cloud environments, to accurately know the totality of assets that need to be monitored and protected within the enterprise. This will also support identifying unauthorized and unmanaged assets to remove or remediate.
  - code: "2"
    title: Inventory and Control of Software Assets
    summary: Actively manage (inventory, track, and correct) all software (operating systems and applications) on the network so that only authorized software is installed and can execute, and that unauthorized and unmanaged software...
    description: Actively manage (inventory, track, and correct) all software (operating systems and applications) on the network so that only authorized software is installed and can execute, and that unauthorized and unmanaged software is found and prevented from installation or execution.
  - code: "3"
    title: Data Protection
    summary: Develop processes and technical controls to identify, classify, securely handle, retain, and dispose of data.
    description: Develop processes and technical controls to identify, classify, securely handle, retain, and dispose of data.
  - code: "4"
    title: Secure Configuration of Enterprise Assets and Software
    summary: Establish and maintain the secure configuration of enterprise assets (end-user devices, including portable and mobile; network devices; non-computing/IoT devices; and servers) and software (operating systems and applicat...
    description: Establish and maintain the secure configuration of enterprise assets (end-user devices, including portable and mobile; network devices; non-computing/IoT devices; and servers) and software (operating systems and applications).
  - code: "5"
    title: Account Management
    summary: Use processes and tools to assign and manage authorization to credentials for user accounts, including administrator accounts, as well as service accounts, to enterprise assets and software.
    description: Use processes and tools to assign and manage authorization to credentials for user accounts, including administrator accounts, as well as service accounts, to enterprise assets and software.
  - code: "6"
    title: Access Control Management
    summary: Use processes and tools to create, assign, manage, and revoke access credentials and privileges for user, administrator, and service accounts for enterprise assets and software.
    description: Use processes and tools to create, assign, manage, and revoke access credentials and privileges for user, administrator, and service accounts for enterprise assets and software.
  - code: "7"
    title: Continuous Vulnerability Management
    summary: Develop a plan to continuously assess and track vulnerabilities on all enterprise assets within the enterprise’s infrastructure, in order to remediate, and minimize, the window of opportunity for attackers.
    description: Develop a plan to continuously assess and track vulnerabilities on all enterprise assets within the enterprise’s infrastructure, in order to remediate, and minimize, the window of opportunity for attackers. Monitor public and private industry sources for new threat and vulnerability information.
  - code: "8"
    title: Audit Log Management
    summary: Collect, alert, review, and retain audit logs of events that could help detect, understand, or recover from an attack.
    description: Collect, alert, review, and retain audit logs of events that could help detect, understand, or recover from an attack.
  - code: "9"
    title: Email and Web Browser Protections
    summary: Improve protections and detections of threats from email and web vectors, as these are opportunities for attackers to manipulate human behavior through direct engagement.
    description: Improve protections and detections of threats from email and web vectors, as these are opportunities for attackers to manipulate human behavior through direct engagement.
  - code: "10"
    title: Malware Defenses
    summary: Prevent or control the installation, spread, and execution of malicious applications, code, or scripts on enterprise assets.
    description: Prevent or control the installation, spread, and execution of malicious applications, code, or scripts on enterprise assets.
  - code: "11"
    title: Data Recovery
    summary: Establish and maintain data recovery practices sufficient to restore in-scope enterprise assets to a pre-incident and trusted state.
    description: Establish and maintain data recovery practices sufficient to restore in-scope enterprise assets to a pre-incident and trusted state.
  - code: "12"
    title: Network Infrastructure Management
    summary: Establish, implement, and actively manage (track, report, correct) network devices, in order to prevent attackers from exploiting vulnerable network services and access points.
    description: Establish, implement, and actively manage (track, report, correct) network devices, in order to prevent attackers from exploiting vulnerable network services and access points.
  - code: "13"
    title: Network Monitoring and Defense
    summary: Operate processes and tooling to establish and maintain comprehensive network monitoring and defense against security threats across the enterprise’s network infrastructure and user base.
    description: Operate processes and tooling to establish and maintain comprehensive network monitoring and defense against security threats across the enterprise’s network infrastructure and user base.
  - code: "14"
    title: Security Awareness and Skills Training
    summary: Establish and maintain a security awareness program to influence behavior among the workforce to be security conscious and properly skilled to reduce cybersecurity risks to the enterprise.
    description: Establish and maintain a security awareness program to influence behavior among the workforce to be security conscious and properly skilled to reduce cybersecurity risks to the enterprise.
  - code: "15"
    title: Service Provider Management
    summary: Develop a process to evaluate service providers who hold sensitive data, or are responsible for an enterprise’s critical IT platforms or processes, to ensure these providers are protecting those platforms and data appr...
    description: Develop a process to evaluate service providers who hold sensitive data, or are responsible for an enterprise’s critical IT platforms or processes, to ensure these providers are protecting those platforms and data appropriately.
  - code: "16"
    title: Application Software Security
    summary: Manage the security life cycle of in-house developed, hosted, or acquired software to prevent, detect, and remediate security weaknesses before they can impact the enterprise.
    description: Manage the security life cycle of in-house developed, hosted, or acquired software to prevent, detect, and remediate security weaknesses before they can impact the enterprise.
  - code: "17"
    title: Incident Response Management
    summary: Establish a program to develop and maintain an incident response capability (e.g., policies, plans, procedures, defined roles, training, and communications) to prepare, detect, and quickly respond to an attack.
    description: Establish a program to develop and maintain an incident response capability (e.g., policies, plans, procedures, defined roles, training, and communications) to prepare, detect, and quickly respond to an attack.
  - code: "18"
    title: Penetration Testing
    summary: Test the effectiveness and resiliency of enterprise assets through identifying and exploiting weaknesses in controls (people, processes, and technology), and simulating the objectives and actions of an attacker.
    description: Test the effectiveness and resiliency of enterprise assets through identifying and exploiting weaknesses in controls (people, processes, and technology), and simulating the objectives and actions of an attacker.
items:
  - group_code: "1"
    code: "1.1"
    title: Establish and Maintain Detailed Enterprise Asset Inventory
    summary: 'Establish and maintain an accurate, detailed, and up-to-date inventory of all enterprise assets with the potential to store or process data, to include: end-user devices (including portable and mobile), network devices...'
    description: 'Establish and maintain an accurate, detailed, and up-to-date inventory of all enterprise assets with the potential to store or process data, to include: end-user devices (including portable and mobile), network devices, non-computing/IoT devices, and servers. Ensure the inventory records the network address (if static), hardware address, machine name, enterprise asset owner, department for each asset, and whether the asset has been approved to connect to the network. For mobile end-user devices, MDM type tools can support this process, where appropriate. This inventory includes assets connected to the infrastructure physically, virtually, remotely, and those within cloud environments. Additionally, it includes assets that are regularly connected to the enterprise’s network infrastructure, even if they are not under control of the enterprise. Review and update the inventory of all enterprise assets bi-annually, or more frequently.'
    asset_class: Devices
    security_function: Identify
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "1"
    code: "1.2"
    title: Address Unauthorized Assets
    summary: Ensure that a process exists to address unauthorized assets on a weekly basis.
    description: Ensure that a process exists to address unauthorized assets on a weekly basis. The enterprise may choose to remove the asset from the network, deny the asset from connecting remotely to the network, or quarantine the asset.
    asset_class: Devices
    security_function: Respond
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "1"
    code: "1.3"
    title: Utilize an Active Discovery Tool
    summary: Utilize an active discovery tool to identify assets connected to the enterprise’s network.
    description: Utilize an active discovery tool to identify assets connected to the enterprise’s network. Configure the active discovery tool to execute daily, or more frequently.
    asset_class: Devices
    security_function: Detect
    tags:
      - ig2
      - ig3
  - group_code: "1"
    code: "1.4"
    title: Use Dynamic Host Configuration Protocol (DHCP) Logging to Update Enterprise Asset Inventory
    summary: Use DHCP logging on all DHCP servers or Internet Protocol (IP) address management tools to update the enterprise’s asset inventory.
    description: Use DHCP logging on all DHCP servers or Internet Protocol (IP) address management tools to update the enterprise’s asset inventory. Review and use logs to update the enterprise’s asset inventory weekly, or more frequently.
    asset_class: Devices
    security_function: Identify
    tags:
      - ig2
      - ig3
  - group_code: "1"
    code: "1.5"
    title: Use a Passive Asset Discovery Tool
    summary: Use a passive discovery tool to identify assets connected to the enterprise’s network.
    description: Use a passive discovery tool to identify assets connected to the enterprise’s network. Review and use scans to update the enterprise’s asset inventory at least weekly, or more frequently.
    asset_class: Devices
    security_function: Detect
    tags:
      - ig3
  - group_code: "2"
    code: "2.1"
    title: Establish and Maintain a Software Inventory
    summary: Establish and maintain a detailed inventory of all licensed software installed on enterprise assets.
    description: Establish and maintain a detailed inventory of all licensed software installed on enterprise assets. The software inventory must document the title, publisher, initial install/use date, and business purpose for each entry; where appropriate, include the Uniform Resource Locator (URL), app store(s), version(s), deployment mechanism, decommission date, and number of licenses. Review and update the software inventory bi-annually, or more frequently.
    asset_class: Software
    security_function: Identify
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "2"
    code: "2.2"
    title: Ensure Authorized Software is Currently Supported
    summary: Ensure that only currently supported software is designated as authorized in the software inventory for enterprise assets.
    description: Ensure that only currently supported software is designated as authorized in the software inventory for enterprise assets. If software is unsupported, yet necessary for the fulfillment of the enterprise’s mission, document an exception detailing mitigating controls and residual risk acceptance. For any unsupported software without an exception documentation, designate as unauthorized. Review the software list to verify software support at least monthly, or more frequently.
    asset_class: Software
    security_function: Identify
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "2"
    code: "2.3"
    title: Address Unauthorized Software
    summary: Ensure that unauthorized software is either removed from use on enterprise assets or receives a documented exception.
    description: Ensure that unauthorized software is either removed from use on enterprise assets or receives a documented exception. Review monthly, or more frequently.
    asset_class: Software
    security_function: Respond
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "2"
    code: "2.4"
    title: Utilize Automated Software Inventory Tools
    summary: Utilize software inventory tools, when possible, throughout the enterprise to automate the discovery and documentation of installed software.
    description: Utilize software inventory tools, when possible, throughout the enterprise to automate the discovery and documentation of installed software.
    asset_class: Software
    security_function: Detect
    tags:
      - ig2
      - ig3
  - group_code: "2"
    code: "2.5"
    title: Allowlist Authorized Software
    summary: Use technical controls, such as application allowlisting, to ensure that only authorized software can execute or be accessed.
    description: Use technical controls, such as application allowlisting, to ensure that only authorized software can execute or be accessed. Reassess bi-annually, or more frequently.
    asset_class: Software
    security_function: Protect
    tags:
      - ig2
      - ig3
  - group_code: "2"
    code: "2.6"
    title: Allowlist Authorized Libraries
    summary: Use technical controls to ensure that only authorized software libraries, such as specific .dll, .ocx, and .so files, are allowed to load into a system process.
    description: Use technical controls to ensure that only authorized software libraries, such as specific .dll, .ocx, and .so files, are allowed to load into a system process. Block unauthorized libraries from loading into a system process. Reassess bi-annually, or more frequently.
    asset_class: Software
    security_function: Protect
    tags:
      - ig2
      - ig3
  - group_code: "2"
    code: "2.7"
    title: Allowlist Authorized Scripts
    summary: Use technical controls, such as digital signatures and version control, to ensure that only authorized scripts, such as specific .ps1 and .py files, are allowed to execute.
    description: Use technical controls, such as digital signatures and version control, to ensure that only authorized scripts, such as specific .ps1 and .py files, are allowed to execute. Block unauthorized scripts from executing. Reassess bi-annually, or more frequently.
    asset_class: Software
    security_function: Protect
    tags:
      - ig3
  - group_code: "3"
    code: "3.1"
    title: Establish and Maintain a Data Management Process
    summary: Establish and maintain a documented data management process.
    description: Establish and maintain a documented data management process. In the process, address data sensitivity, data owner, handling of data, data retention limits, and disposal requirements, based on sensitivity and retention standards for the enterprise. Review and update documentation annually, or when significant enterprise changes occur that could impact this Safeguard.
    asset_class: Data
    security_function: Govern
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "3"
    code: "3.2"
    title: Establish and Maintain a Data Inventory
    summary: Establish and maintain a data inventory based on the enterprise’s data management process.
    description: Establish and maintain a data inventory based on the enterprise’s data management process. Inventory sensitive data, at a minimum. Review and update inventory annually, at a minimum, with a priority on sensitive data.
    asset_class: Data
    security_function: Identify
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "3"
    code: "3.3"
    title: Configure Data Access Control Lists
    summary: Configure data access control lists based on a user’s need to know.
    description: Configure data access control lists based on a user’s need to know. Apply data access control lists, also known as access permissions, to local and remote file systems, databases, and applications.
    asset_class: Data
    security_function: Protect
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "3"
    code: "3.4"
    title: Enforce Data Retention
    summary: Retain data according to the enterprise’s documented data management process.
    description: Retain data according to the enterprise’s documented data management process. Data retention must include both minimum and maximum timelines.
    asset_class: Data
    security_function: Protect
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "3"
    code: "3.5"
    title: Securely Dispose of Data
    summary: Securely dispose of data as outlined in the enterprise’s documented data management process.
    description: Securely dispose of data as outlined in the enterprise’s documented data management process. Ensure the disposal process and method are commensurate with the data sensitivity.
    asset_class: Data
    security_function: Protect
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "3"
    code: "3.6"
    title: Encrypt Data on End-User Devices
    summary: Encrypt data on end-user devices containing sensitive data.
    description: 'Encrypt data on end-user devices containing sensitive data. Example implementations can include: Windows BitLocker®, Apple FileVault®, Linux® dm-crypt.'
    asset_class: Data
    security_function: Protect
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "3"
    code: "3.7"
    title: Establish and Maintain a Data Classification Scheme
    summary: Establish and maintain an overall data classification scheme for the enterprise.
    description: Establish and maintain an overall data classification scheme for the enterprise. Enterprises may use labels, such as “Sensitive,” “Confidential,” and “Public,” and classify their data according to those labels. Review and update the classification scheme annually, or when significant enterprise changes occur that could impact this Safeguard.
    asset_class: Data
    security_function: Identify
    tags:
      - ig2
      - ig3
  - group_code: "3"
    code: "3.8"
    title: Document Data Flows
    summary: Document data flows.
    description: Document data flows. Data flow documentation includes service provider data flows and should be based on the enterprise’s data management process. Review and update documentation annually, or when significant enterprise changes occur that could impact this Safeguard.
    asset_class: Data
    security_function: Identify
    tags:
      - ig2
      - ig3
  - group_code: "3"
    code: "3.9"
    title: Encrypt Data on Removable Media
    summary: Encrypt data on removable media.
    description: Encrypt data on removable media.
    asset_class: Data
    security_function: Protect
    tags:
      - ig2
      - ig3
  - group_code: "3"
    code: "3.10"
    title: Encrypt Sensitive Data in Transit
    summary: Encrypt sensitive data in transit.
    description: 'Encrypt sensitive data in transit. Example implementations can include: Transport Layer Security (TLS) and Open Secure Shell (OpenSSH).'
    asset_class: Data
    security_function: Protect
    tags:
      - ig2
      - ig3
  - group_code: "3"
    code: "3.11"
    title: Encrypt Sensitive Data at Rest
    summary: Encrypt sensitive data at rest on servers, applications, and databases.
    description: Encrypt sensitive data at rest on servers, applications, and databases. Storage-layer encryption, also known as server-side encryption, meets the minimum requirement of this Safeguard. Additional encryption methods may include application-layer encryption, also known as client-side encryption, where access to the data storage device(s) does not permit access to the plain-text data.
    asset_class: Data
    security_function: Protect
    tags:
      - ig2
      - ig3
  - group_code: "3"
    code: "3.12"
    title: Segment Data Processing and Storage Based on Sensitivity
    summary: Segment data processing and storage based on the sensitivity of the data.
    description: Segment data processing and storage based on the sensitivity of the data. Do not process sensitive data on enterprise assets intended for lower sensitivity data.
    asset_class: Data
    security_function: Protect
    tags:
      - ig2
      - ig3
  - group_code: "3"
    code: "3.13"
    title: Deploy a Data Loss Prevention Solution
    summary: Implement an automated tool, such as a host-based Data Loss Prevention (DLP) tool to identify all sensitive data stored, processed, or transmitted through enterprise assets, including those located onsite or at a remote...
    description: Implement an automated tool, such as a host-based Data Loss Prevention (DLP) tool to identify all sensitive data stored, processed, or transmitted through enterprise assets, including those located onsite or at a remote service provider, and update the enterprise's data inventory.
    asset_class: Data
    security_function: Protect
    tags:
      - ig3
  - group_code: "3"
    code: "3.14"
    title: Log Sensitive Data Access
    summary: Log sensitive data access, including modification and disposal.
    description: Log sensitive data access, including modification and disposal.
    asset_class: Data
    security_function: Detect
    tags:
      - ig3
  - group_code: "4"
    code: "4.1"
    title: Establish and Maintain a Secure Configuration Process
    summary: Establish and maintain a documented secure configuration process for enterprise assets (end-user devices, including portable and mobile, non-computing/IoT devices, and servers) and software (operating systems and applica...
    description: Establish and maintain a documented secure configuration process for enterprise assets (end-user devices, including portable and mobile, non-computing/IoT devices, and servers) and software (operating systems and applications). Review and update documentation annually, or when significant enterprise changes occur that could impact this Safeguard.
    asset_class: Documentation
    security_function: Govern
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "4"
    code: "4.2"
    title: Establish and Maintain a Secure Configuration Process for Network Infrastructure
    summary: Establish and maintain a documented secure configuration process for network devices.
    description: Establish and maintain a documented secure configuration process for network devices. Review and update documentation annually, or when significant enterprise changes occur that could impact this Safeguard.
    asset_class: Documentation
    security_function: Govern
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "4"
    code: "4.3"
    title: Configure Automatic Session Locking on Enterprise Assets
    summary: Configure automatic session locking on enterprise assets after a defined period of inactivity.
    description: Configure automatic session locking on enterprise assets after a defined period of inactivity. For general purpose operating systems, the period must not exceed 15 minutes. For mobile end-user devices, the period must not exceed 2 minutes.
    asset_class: Devices
    security_function: Protect
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "4"
    code: "4.4"
    title: Implement and Manage a Firewall on Servers
    summary: Implement and manage a firewall on servers, where supported.
    description: Implement and manage a firewall on servers, where supported. Example implementations include a virtual firewall, operating system firewall, or a third-party firewall agent.
    asset_class: Devices
    security_function: Protect
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "4"
    code: "4.5"
    title: Implement and Manage a Firewall on End-User Devices
    summary: Implement and manage a host-based firewall or port-filtering tool on end-user devices, with a default-deny rule that drops all traffic except those services and ports that are explicitly allowed.
    description: Implement and manage a host-based firewall or port-filtering tool on end-user devices, with a default-deny rule that drops all traffic except those services and ports that are explicitly allowed.
    asset_class: Devices
    security_function: Protect
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "4"
    code: "4.6"
    title: Securely Manage Enterprise Assets and Software
    summary: Securely manage enterprise assets and software.
    description: Securely manage enterprise assets and software. Example implementations include managing configuration through version-controlled Infrastructure-as-Code (IaC) and accessing administrative interfaces over secure network protocols, such as Secure Shell (SSH) and Hypertext Transfer Protocol Secure (HTTPS). Do not use insecure management protocols, such as Telnet (Teletype Network) and HTTP, unless operationally essential.
    asset_class: Devices
    security_function: Protect
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "4"
    code: "4.7"
    title: Manage Default Accounts on Enterprise Assets and Software
    summary: Manage default accounts on enterprise assets and software, such as root, administrator, and other pre-configured vendor accounts.
    description: 'Manage default accounts on enterprise assets and software, such as root, administrator, and other pre-configured vendor accounts. Example implementations can include: disabling default accounts or making them unusable.'
    asset_class: Users
    security_function: Protect
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "4"
    code: "4.8"
    title: Uninstall or Disable Unnecessary Services on Enterprise Assets and Software
    summary: Uninstall or disable unnecessary services on enterprise assets and software, such as an unused file sharing service, web application module, or service function.
    description: Uninstall or disable unnecessary services on enterprise assets and software, such as an unused file sharing service, web application module, or service function.
    asset_class: Devices
    security_function: Protect
    tags:
      - ig2
      - ig3
  - group_code: "4"
    code: "4.9"
    title: Configure Trusted DNS Servers on Enterprise Assets
    summary: Configure trusted DNS servers on network infrastructure.
    description: Configure trusted DNS servers on network infrastructure. Example implementations include configuring network devices to use enterprise-controlled DNS servers and/or reputable externally accessible DNS servers.
    asset_class: Devices
    security_function: Protect
    tags:
      - ig2
      - ig3
  - group_code: "4"
    code: "4.10"
    title: Enforce Automatic Device Lockout on Portable End-User Devices
    summary: Enforce automatic device lockout following a predetermined threshold of local failed authentication attempts on portable end-user devices, where supported.
    description: Enforce automatic device lockout following a predetermined threshold of local failed authentication attempts on portable end-user devices, where supported. For laptops, do not allow more than 20 failed authentication attempts; for tablets and smartphones, no more than 10 failed authentication attempts. Example implementations include Microsoft® InTune Device Lock and Apple® Configuration Profile maxFailedAttempts.
    asset_class: Devices
    security_function: Protect
    tags:
      - ig2
      - ig3
  - group_code: "4"
    code: "4.11"
    title: Enforce Remote Wipe Capability on Portable End-User Devices
    summary: Remotely wipe enterprise data from enterprise-owned portable end-user devices when deemed appropriate such as lost or stolen devices, or when an individual no longer supports the enterprise.
    description: Remotely wipe enterprise data from enterprise-owned portable end-user devices when deemed appropriate such as lost or stolen devices, or when an individual no longer supports the enterprise.
    asset_class: Data
    security_function: Protect
    tags:
      - ig2
      - ig3
  - group_code: "4"
    code: "4.12"
    title: Separate Enterprise Workspaces on Mobile End-User Devices
    summary: Ensure separate enterprise workspaces are used on mobile end-user devices, where supported.
    description: Ensure separate enterprise workspaces are used on mobile end-user devices, where supported. Example implementations include using an Apple® Configuration Profile or Android™ Work Profile to separate enterprise applications and data from personal applications and data.
    asset_class: Data
    security_function: Protect
    tags:
      - ig3
  - group_code: "5"
    code: "5.1"
    title: Establish and Maintain an Inventory of Accounts
    summary: Establish and maintain an inventory of all accounts managed in the enterprise.
    description: Establish and maintain an inventory of all accounts managed in the enterprise. The inventory must at a minimum include user, administrator, and service accounts. The inventory, at a minimum, should contain the person’s name, username, start/stop dates, and department. Validate that all active accounts are authorized, on a recurring schedule at a minimum quarterly, or more frequently.
    asset_class: Users
    security_function: Identify
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "5"
    code: "5.2"
    title: Use Unique Passwords
    summary: Use unique passwords for all enterprise assets.
    description: Use unique passwords for all enterprise assets. Best practice implementation includes, at a minimum, an 8-character password for accounts using Multi-Factor Authentication (MFA) and a 14-character password for accounts not using MFA.
    asset_class: Users
    security_function: Protect
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "5"
    code: "5.3"
    title: Disable Dormant Accounts
    summary: Delete or disable any dormant accounts after a period of 45 days of inactivity, where supported.
    description: Delete or disable any dormant accounts after a period of 45 days of inactivity, where supported.
    asset_class: Users
    security_function: Protect
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "5"
    code: "5.4"
    title: Restrict Administrator Privileges to Dedicated Administrator Accounts
    summary: Restrict administrator privileges to dedicated administrator accounts on enterprise assets.
    description: Restrict administrator privileges to dedicated administrator accounts on enterprise assets. Conduct general computing activities, such as internet browsing, email, and productivity suite use, from the user’s primary, non-privileged account.
    asset_class: Users
    security_function: Protect
    tags:
      - ig1
      - ig2
      - ig3
  - group_code: "5"
    code: "5.5"
    title: Establish and Maintain an Inventory of Service Accounts
    summary: Establish and maintain an inventory of service accounts.
    description: Establish and maintain an inventory of service accounts. The inventory, at a minimum, must contain department owner, review date, and purpose. Perform service account reviews to validate that all active accounts are authorized, on a recurring schedule at a minimum quarterly, or more frequently.
    asset_class: Users
    security_function: Identify
    tags:
      - ig2
      - ig3
  - group_code: "5"
    code: "5.6"
    title: Centralize Account Management
    summary: Centralize account management through a directory or identity service.
